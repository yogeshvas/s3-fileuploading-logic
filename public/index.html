<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S3 Credential Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #f8fafc; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1.25rem; }
    button {
      background: #3b82f6; color: #fff; border: none; padding: 0.5rem 1rem;
      border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    input[type="file"] { color: #e2e8f0; font-size: 0.875rem; }
    .tag {
      display: inline-block; background: #0f172a; border: 1px solid #334155;
      border-radius: 0.375rem; padding: 0.25rem 0.6rem; font-size: 0.8rem;
      margin: 0.25rem; cursor: pointer; transition: border-color 0.15s;
    }
    .tag:hover, .tag.active { border-color: #3b82f6; color: #60a5fa; }
    .file-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0; border-bottom: 1px solid #1e293b; font-size: 0.875rem;
    }
    .file-row:last-child { border-bottom: none; }
    .file-name { flex: 1; word-break: break-all; }
    .file-meta { color: #64748b; font-size: 0.75rem; margin: 0 0.75rem; white-space: nowrap; }
    a.dl { color: #3b82f6; text-decoration: none; font-size: 0.8rem; }
    a.dl:hover { text-decoration: underline; }
    .status { margin-top: 0.5rem; font-size: 0.8rem; padding: 0.4rem 0.75rem; border-radius: 0.375rem; }
    .ok { background: #14532d; color: #86efac; }
    .err { background: #450a0a; color: #fca5a5; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #475569;
      border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-left: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #buckets-list, #files-list { margin-top: 0.5rem; }
    .empty { color: #475569; font-size: 0.875rem; padding: 0.5rem 0; }
  </style>
</head>
<body>

<h1>AWS S3 Credential Tester</h1>

<!-- List Buckets -->
<div class="card">
  <h2>1. List Buckets</h2>
  <button id="btn-list-buckets">List All Buckets</button>
  <div id="buckets-list"></div>
</div>

<!-- List Files -->
<div class="card">
  <h2>2. List Files in Bucket</h2>
  <p style="font-size:0.85rem;color:#64748b;margin-bottom:0.5rem;">Click a bucket above or type below</p>
  <div style="display:flex;gap:0.5rem;align-items:center;">
    <input id="bucket-input" type="text" placeholder="bucket-name"
      style="background:#0f172a;border:1px solid #334155;border-radius:0.5rem;padding:0.45rem 0.75rem;color:#e2e8f0;font-size:0.875rem;flex:1;" />
    <button id="btn-list-files">List Files</button>
  </div>
  <div id="files-list"></div>
</div>

<!-- Upload -->
<div class="card">
  <h2>3. Upload File</h2>
  <p style="font-size:0.85rem;color:#64748b;margin-bottom:0.5rem;">Uses the bucket name from field above</p>
  <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
    <input id="upload-input" type="file" />
    <button id="btn-upload">Upload</button>
  </div>
  <div id="upload-status"></div>
</div>

<script>
  const api = (path, opts) => fetch(path, opts).then(r => r.json());

  function fmt(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function status(el, msg, ok) {
    el.innerHTML = `<div class="status ${ok ? 'ok' : 'err'}">${msg}</div>`;
  }

  // ── List Buckets ──────────────────────────────────────────
  document.getElementById('btn-list-buckets').addEventListener('click', async () => {
    const btn = document.getElementById('btn-list-buckets');
    const list = document.getElementById('buckets-list');
    btn.disabled = true;
    list.innerHTML = '<span class="spinner"></span>';

    const data = await api('/api/buckets').catch(e => ({ error: e.message }));
    btn.disabled = false;

    if (data.error) {
      list.innerHTML = `<div class="status err">${data.error}</div>`;
      return;
    }

    if (!data.buckets.length) {
      list.innerHTML = '<p class="empty">No buckets found.</p>';
      return;
    }

    list.innerHTML = data.buckets.map(b =>
      `<span class="tag" data-bucket="${b.name}">${b.name}</span>`
    ).join('');

    list.querySelectorAll('.tag').forEach(tag => {
      tag.addEventListener('click', () => {
        list.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        const name = tag.dataset.bucket;
        document.getElementById('bucket-input').value = name;
        document.getElementById('btn-list-files').click();
      });
    });
  });

  // ── List Files ────────────────────────────────────────────
  document.getElementById('btn-list-files').addEventListener('click', async () => {
    const bucket = document.getElementById('bucket-input').value.trim();
    const filesList = document.getElementById('files-list');
    if (!bucket) { status(filesList, 'Enter a bucket name first.', false); return; }

    const btn = document.getElementById('btn-list-files');
    btn.disabled = true;
    filesList.innerHTML = '<span class="spinner"></span>';

    const data = await api(`/api/buckets/${encodeURIComponent(bucket)}/files`).catch(e => ({ error: e.message }));
    btn.disabled = false;

    if (data.error) { status(filesList, data.error, false); return; }

    if (!data.files.length) {
      filesList.innerHTML = '<p class="empty">Bucket is empty.</p>';
      return;
    }

    filesList.innerHTML = data.files.map(f => `
      <div class="file-row">
        <span class="file-name">${f.key}</span>
        <span class="file-meta">${fmt(f.size)}</span>
        <a class="dl" href="#" data-bucket="${bucket}" data-key="${f.key}">Download</a>
      </div>
    `).join('');

    filesList.querySelectorAll('a.dl').forEach(a => {
      a.addEventListener('click', async e => {
        e.preventDefault();
        a.textContent = '...';
        const { url, error } = await api(
          `/api/download/${encodeURIComponent(a.dataset.bucket)}/${encodeURIComponent(a.dataset.key)}`
        ).catch(err => ({ error: err.message }));
        if (error) { a.textContent = 'Error'; return; }
        window.open(url, '_blank');
        a.textContent = 'Download';
      });
    });
  });

  // ── Upload ─────────────────────────────────────────────────
  document.getElementById('btn-upload').addEventListener('click', async () => {
    const bucket = document.getElementById('bucket-input').value.trim();
    const fileInput = document.getElementById('upload-input');
    const uploadStatus = document.getElementById('upload-status');

    if (!bucket) { status(uploadStatus, 'Enter a bucket name first.', false); return; }
    if (!fileInput.files.length) { status(uploadStatus, 'Select a file first.', false); return; }

    const btn = document.getElementById('btn-upload');
    btn.disabled = true;
    uploadStatus.innerHTML = '<span class="spinner"></span> Uploading...';

    const form = new FormData();
    form.append('file', fileInput.files[0]);

    const data = await fetch(`/api/upload?bucket=${encodeURIComponent(bucket)}`, {
      method: 'POST', body: form
    }).then(r => r.json()).catch(e => ({ error: e.message }));

    btn.disabled = false;

    if (data.error) { status(uploadStatus, data.error, false); return; }
    status(uploadStatus, data.message, true);
    fileInput.value = '';
    // Refresh file list
    document.getElementById('btn-list-files').click();
  });
</script>
</body>
</html>
